name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows:
    name: CI / Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: cargo build
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
      - run: cargo clippy -- -D warnings
        working-directory: src-tauri

  quality:
    name: CI / quality
    runs-on: macos-14
    steps:
      - name: Require main as the release PR source
        if: >-
          github.event_name == 'pull_request' &&
          github.base_ref == 'release' &&
          (github.head_ref != 'main' || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "Only main may open a pull request into release." >&2
          exit 1

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-release-version.mjs
      - name: Require an unused release version
        if: github.event_name == 'pull_request' && github.base_ref == 'release'
        run: node scripts/check-release-version.mjs --require-unreleased
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm build
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri
      - run: cargo clippy -- -D warnings
        working-directory: src-tauri
