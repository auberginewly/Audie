name: Bug report / 问题反馈
description: Report a reproducible problem in Audie / 反馈可以复现的 Audie 问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Audie. Remove API keys, recordings, and personal information before submitting.

        感谢帮助改进 Audie。提交前请删除 API Key、录音内容和个人信息。
  - type: input
    id: app-version
    attributes:
      label: Audie version / Audie 版本
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version / macOS 版本
      placeholder: macOS 15.5
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture / Mac 芯片架构
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
        - Unknown / 不清楚
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem / 问题描述
      description: What happened? / 发生了什么？
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: |
        1. Open Audie / 打开 Audie
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      description: Optional. Remove secrets and private content first. / 可选，请先删除密钥和隐私内容。
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check / 隐私确认
      options:
        - label: I removed API keys, recordings, and personal information. / 我已删除 API Key、录音和个人信息。
          required: true
